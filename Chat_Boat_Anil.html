<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ask Anil Bhau 🤖</title>
 
  <style>

    body {

      font-family: Arial, sans-serif;

      background: #f3f4f6;

      height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;

    }
 
    .chat-container {

      width: 400px;

      background: #ffffff;

      border-radius: 14px;

      box-shadow: 0 6px 18px rgba(0,0,0,0.15);

      display: flex;

      flex-direction: column;

    }
 
    .chat-header {

      background: #1e3a8a;

      color: white;

      padding: 14px;

      font-size: 18px;

      font-weight: bold;

      text-align: center;

      border-radius: 14px 14px 0 0;

    }
 
    .chat-messages {

      flex: 1;

      padding: 12px;

      overflow-y: auto;

      background: #f9fafb;

    }
 
    .message {

      max-width: 80%;

      margin-bottom: 10px;

      padding: 10px 14px;

      border-radius: 16px;

      font-size: 14px;

      line-height: 1.4;

    }
 
    .user {

      background: #2563eb;

      color: white;

      margin-left: auto;

      text-align: right;

    }
 
    .anil {

      background: #e5e7eb;

      color: #111827;

      margin-right: auto;

      text-align: left;

    }
 
    .chat-input {

      display: flex;

      gap: 8px;

      padding: 12px;

      border-top: 1px solid #e5e7eb;

    }
 
    input {

      flex: 1;

      padding: 8px 10px;

      border-radius: 8px;

      border: 1px solid #d1d5db;

      font-size: 14px;

    }
 
    button {

      padding: 8px 16px;

      border: none;

      border-radius: 8px;

      background: #1e40af;

      color: white;

      font-size: 14px;

      cursor: pointer;

    }
 
    button:hover {

      background: #1d4ed8;

    }
</style>
</head>
<body>
 
<div class="chat-container">
<div class="chat-header">Ask Anil Bhau 🤖</div>
 
  <div class="chat-messages" id="chat">
<div class="message anil">

      Hello! I’m Anil Bhau. You can ask me about Nexthink, alerts, dashboards, performance issues, or use cases.
</div>
</div>
 
  <div class="chat-input">
<input

      type="text"

      id="userInput"

      placeholder="Type your question here..."

      onkeydown="if(event.key === 'Enter') sendMessage()"

    />
<button onclick="sendMessage()">Send</button>
</div>
</div>
 
<script>

  function anilReply(userMessage) {

    const msg = userMessage.toLowerCase();
 
    if (msg.includes("hi") || msg.includes("hello")) {

      return "Hello! This is Anil Bhau. How can I assist you today?";

    }
 
    if (msg.includes("nexthink")) {

      return "Sure. Please share your device name and allow me some time. I will check your device status in Nexthink and get back to you shortly.";

    }
 
    if (msg.includes("device")) {

      return "Thank you for sharing the device name. Let me check the status and I will update you shortly.";

    }
 
    if (msg.includes("alert")) {

      return "Alerts in Nexthink proactively detect IT issues before users experience major problems. They help IT teams take preventive actions.";

    }
 
    if (msg.includes("dashboard")) {

      return "Please log in to the Nexthink portal, navigate to Live Dashboards, search for the specific use case you are working on, and review the insights available there.";

    }
 
    if (msg.includes("slow") || msg.includes("performance")) {

      return "Please share your device name so that we can analyze CPU, memory, and disk usage. Nexthink helps identify performance bottlenecks effectively.";

    }
 
    if (msg.includes("issue") || msg.includes("problem")) {

      return "Please provide the name of the Nexthink use case you are working on. This will help me guide you more accurately.";

    }
 
    if (msg.includes("use case")) {

      return "Thank you. I will review the use case and share guidance based on the available Nexthink data.";

    }
 
    if (msg.includes("thank")) {

      return "You’re welcome. Feel free to reach out if you need any further assistance.";

    }
 
    return "I understand your query. Please share additional details such as device name or use case so I can assist you better.";

  }
 
  function sendMessage() {

    const input = document.getElementById("userInput");

    const message = input.value.trim();

    if (!message) return;
 
    const chat = document.getElementById("chat");
 
    chat.innerHTML += `<div class="message user">${message}</div>`;

    chat.innerHTML += `<div class="message anil">${anilReply(message)}</div>`;
 
    input.value = "";

    chat.scrollTop = chat.scrollHeight;

  }
</script>
 
</body>
</html>
